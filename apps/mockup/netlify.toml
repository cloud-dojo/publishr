# =============================================================================
# Netlify 設定: 旧Viteモックアップ (apps/mockup) を公開する
# -----------------------------------------------------------------------------
# - スタンドアロンの Vite/React SPA（workspace 依存なし）。
# - Netlify 側でこのサイトの「Base directory」を apps/mockup に設定すること。
#   その場合 Netlify はこの netlify.toml を読む（root の Next.js 用とは別サイト）。
# - SPA なので全パスを index.html にフォールバックさせる（react-router 対応）。
# =============================================================================

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA フォールバック（旧 vercel.json の rewrite と同等）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
