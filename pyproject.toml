[project]
name = "publishr-workspace"
version = "0.0.0"
description = "Publishr workspace root (uv) — BFF + ADK agents + shared schema"
requires-python = ">=3.12"

[tool.uv.workspace]
members = [
    "packages/shared-schema/py",
    "agents",
    "apps/api",
]

[tool.uv.sources]
publishr-schema = { workspace = true }
publishr-agents = { workspace = true }

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["packages", "agents", "apps/api"]
