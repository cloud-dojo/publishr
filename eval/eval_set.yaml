# Publishr Eval Set（サンプル）
# ── これは「良い企画・良い本とは何か」を非エンジニア(B)が言葉で定義する成果物 ──
#   設計・基準づくり: B（非エンジニア）   採点ロジックの実装・CIゲート化: A（エンジニア）
#   使い方: 各項目の score が閾値未満なら CI でデプロイを止める（品質ゲート＝基準5/L4）
#   B は「観点・良い例・悪い例」を埋めるだけでよい（コード不要）。

- id: plan_relevance
  観点: 入荷理由が観測(Keepメモ)の“具体的な事実”に紐づいているか
  対象: plan.reason
  採点: 1-5   # 5=具体メモを名指しで引用 / 3=テーマは合うが一般的 / 1=観測と無関係
  閾値: ">=4"
  良い例: "直近のメモに「管掌範囲の拡大」「1on1の負荷増」が増加。30名規模への移行期と読みました。"
  悪い例: "マネジメントに関心がありそうなので書きました。"

- id: proposal_diversity
  観点: 3つの企画(実務直撃/フレームワーク/逆張り)が“構造的に別物”か（言い換えでない）
  対象: candidates
  採点: 1-5   # 5=切り口が三者三様 / 1=同じ主張の言い換え
  閾値: ">=4"
  良い例: ["任せ方の設計図", "問いで動かす現場", "あえて抱え込め"]
  悪い例: ["権限委譲のすすめ", "上手な権限委譲", "委譲のコツ"]

- id: selection_adversarial
  観点: 選抜が敵対的か（全却下→再提出が1回起き、再提出後に採否が割れる）
  対象: reject_log
  採点: boolean   # R1に却下あり かつ R2に採用と却下/保留が混在
  閾値: "== true"
  良い例: "R1で全却下→再提出→R2で『任せ方の設計図』採用・他は却下/保留"
  悪い例: "全部いきなり採用（＝自己却下が起きていない）"

- id: author_voice_consistency
  観点: 序文・アジェンダが作家ペルソナの文体/思想/口癖を保っているか
  対象: book.prefaceSample, book.agenda
  採点: 1-5   # 5=その作家にしか書けない声 / 1=没個性
  閾値: ">=4"
  良い例: "霧島 玄：短く断定『結論から言う。…それは設計の問題だ』"
  悪い例: "誰が書いても同じ一般的な自己啓発文"

- id: stocking_reason_credibility
  観点: 「なぜ“いま”あなたに」が観測の証拠を引用し、局面を名指ししているか(F3)
  対象: plan.reason, plan.readerSituation
  採点: 1-5
  閾値: ">=4"
  良い例: "あなたはいま10→30名規模への移行期にいる、と読みました。"
  悪い例: "リーダーとして成長したい方へ。"
