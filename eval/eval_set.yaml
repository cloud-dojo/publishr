# =============================================================================
# Publishr Eval Set（企画の関連性スコア / LLM-as-judge）
# -----------------------------------------------------------------------------
# 新構想（Drive+Calendar+Tasks 観測 / 企画3階層 / 4観点×25点・100点満点・閾値70）版。
# 佐倉美咲プロファイルに対する (企画, 期待スコア帯) 8件。CI の品質ゲートで使用（MVPスコープ §9）。
# judge プロンプトは packages/prompts/eval_judge.md と一致させること。
#
# ⚠️ 旧 eval_set.yaml（Keep観測 / 3体 / 5観点1-5点）から構想ごと差し替え。
#    旧版は git 履歴から参照可能。Eval ハーネス側のスキーマ更新は別途（バック担当主導）。
# =============================================================================

meta:
  description: >-
    Publishr Eval Set（企画の関連性スコア／LLM-as-judge）。佐倉美咲プロファイルに対する
    (企画, 期待スコア帯) 8件。CIの品質ゲートで使用。スコア0-100・4観点×25 に整合。
  persona: 佐倉美咲（35歳・食品メーカー新任マーケ課長・部下7名・年上佐藤健一42歳）
  source: "packages/shared-schema/fixtures/{drive,calendar,tasks}.json（evidence源の id 規約＝drv_/cal_/tsk_。例: drive/03=drv_003・calendar cal_028＝6/5役員報告）"
  judge: Vertex AI Gemini Pro
  scoreRange: [0, 100]
  rubricObservations: [relevance, differentiation, researchUse, titleHook]
  rubricNote: 4観点・各0〜25点・合計0〜100。企画リーダー（エージェントIO契約 §4-2a）と同一ルーブリック。
  threshold:
    honmeiMin: 70           # 本命企画の合格下限
    serendipityMin: 70      # セレンディピティも合格下限70（①relevanceを嗜好・許容度整合に読み替えた同一閾値。旧serendipityBand[30,60]は2026-06-12廃止）
    lowMax: 40              # ずれ企画の上限（ゲートが落とす）
    passRule: 8件中7件パスで通過（87.5%）
  composition:
    high_relevance: 4
    low_relevance: 2
    serendipity: 2
  diagnostic:
    note: >-
      上記8件はCIゲート（8件中7件パスで通過）。これとは別に、閾値70近傍の判別力と
      judge再現性(C5.4)・閾値運用調整(C5.5)を確認するための borderlineCases を2件付す。
      borderlineCases は意図的に70近傍に置くため、8件中7件の通過規則には含めない（診断専用）。

# 採点ルーブリック（judge への共有方針）
rubric: >-
  読者プロファイル（3層）に対する企画(PlanProposal 8項目)の的中度を4観点×各0〜25点（合計0〜100）で採点する。
  ①relevance=役職/組織規模/業界/currentWork(局面・課題)へのリアルな踏み込み
  ②differentiation=既製本が構造的に出せない固有局面への差別化
  ③researchUse=調査(売れ筋/marketGap・テーマ知見)の反映
  ④titleHook=この読者一人を掴むタイトルのエッジ。
  一般論的（最大公約数的）は減点。セレンディピティ企画では①を読み替える：業務テーマへの直撃や
  whyNowForYouでの課題接続は要求せず（課題に触れないのが仕様）、テーマ・章立てが読者の嗜好・許容度
  （readingGenres・readingBehavior・serendipityTolerance）と整合し、読者の立場に普遍的に資する学びを
  提供できているかで測る。閾値は本命と同じ70。

# 採点対象の読者プロファイル（3層構造: base / currentWork / readingBehavior）
readerProfile:
  base:
    industry: 食品・飲料メーカー
    jobType: マーケティング・ブランド
    position: 課長・マネージャー（2026/04新任）
    orgScale: 部下7名（年上ベテランの佐藤健一42歳・経験19年を含む）
    readingGenres:
      - すぐ使える実践書・ハウツー
      - 事例・ストーリーで学ぶ
  currentWork:
    currentSituation: >-
      新任2ヶ月。しずく天然水の春リニューアル判断と6/5役員中間報告を控え方針に自信が持てない／
      初の上期評価面談準備／年上部下マネジメントに戸惑い／会議過多で読書時間ゼロ
    activeWorkThemes:
      - しずく天然水 春リニューアルの意思決定
      - 新任マネジメント
      - 上期評価面談の準備
      - 会議ファシリテーション
    challenges:
      - 年上で実力者の佐藤さんにどこまで・どう任せるかの距離感
      - リニューアル方針に確信が持てず役員報告の根拠を固めきれない
      - 測りにくい仕事をどう評価するか
    upcomingKeyEvents:
      - { title: 役員中間報告, date: 2026-06-05 }
      - { title: 上期評価面談（初）, date: 2026-06-中旬 }
    evidence:
      - { claim: 年上部下の任せ方に悩む, source: "drive:06_1on1_議事メモ集" }
      - { claim: 6/5に役員中間報告, source: "calendar:cal_028_役員中間報告" }
      - { claim: 春リニューアルを担当, source: "drive:01_しずく天然水_春リニューアル企画書" }
  readingBehavior:
    recentReads: []
    highlightsSummary: ""
    dropSignals: []
    feedbackSummary: ""
    serendipityTolerance: mid
    stylePreference: 実務的・対話的

# 8件の評価ケース（高関連4 / ずれ2 / セレンディピティ2）
cases:
  # --- 高関連: 役職・年上部下・評価の3局面に同時的中 -------------------------
  - id: eval_01
    kind: high_relevance
    expectedBand: [70, 100]
    plan:
      tentativeTitle: 年上のベテラン部下に、どう任せ・どう評価しますか？
      readerSituation: 新任2ヶ月。初めて年上で実力者の佐藤さんを含む7名を率いる移行期にいる
      whyNowForYou: 1on1メモに『任せ方に迷う』が続き、6/5役員報告と初の評価面談が重なる今に最も効くから
      coreMessage: 年上の部下は『管理』ではなく『期待役割の合意』で動いてもらう。権限は気分でなく構造で配る
      diffFromMarket: 売れ筋は一般マネージャー向けの委譲論。本書は『新任×年上の実力者部下×消費財ブランド職』の局面に限定して具体化（marketGap）
      keyInsights:
        - 権限の三層モデル（報告のみ/相談の上で実行/完全委任）
        - 敬意と権限の分離
        - 任せた後の関わり方
      agendaOutline: [なぜ抱え込むのか, 任せられないの正体, 年上部下への任せ方, 権限の三層モデル, 7人分の権限設計図, 任せたあとの関わり方]
      recommendedAuthorTypes: [経営コンサル出身ロジカル型, 現場叩き上げ型, 組織論の学術型]
    rationale: 役職(新任課長)・年上部下・評価の3局面に同時的中。4観点とも高得点で総合70以上が正答。

  - id: eval_02
    kind: high_relevance
    expectedBand: [70, 100]
    plan:
      tentativeTitle: 新任マネージャーの最初の90日
      readerSituation: 昇格2ヶ月、何から手をつければよいか手探りで走っている
      whyNowForYou: 課長就任メモ(drive/03)の『最初の90日でやること』が未整理のまま走っているから
      coreMessage: プレイヤーから『人を通して成果を出す』への移行を、最初の90日で型にする
      diffFromMarket: 汎用の90日本でなく、消費財ブランド職×部下7名×春リニューアル進行中という同時並行局面に合わせた優先順位設計
      keyInsights: [移行期の意思決定の型, 先に決めること/後回しにすること, 信頼の初期構築]
      agendaOutline: [移行の心理, 最初の30日, 60日, 90日, やらないことの決定]
      recommendedAuthorTypes: [経営コンサル出身ロジカル型, 人事・組織開発型]
    rationale: 課長就任メモの移行期に直撃。移行の型として的中、総合70以上が正答。

  - id: eval_03
    kind: high_relevance
    expectedBand: [70, 100]
    plan:
      tentativeTitle: '"ダメ出し"にしない評価面談——測りにくい仕事をどう評価するか'
      readerSituation: 初の上期評価面談を控え、メンバーの目標記入も止まっている
      whyNowForYou: 評価面談タスクと目標未記入(drive/04)に直面し、何を基準に伝えるか分からないから
      coreMessage: 数字で測れない仕事を、モチベーションを下げずに評価し言語化するフィードバックの型
      diffFromMarket: 一般的なフィードバック本でなく、新任課長が初の評価面談で測りにくい仕事を扱う局面に限定
      keyInsights: [事実と解釈の分離, 期待役割の事前合意, 面談の構造化]
      agendaOutline: [評価の不安の正体, 測りにくさへの向き合い方, 面談の準備, 伝え方の型, 面談後の関わり]
      recommendedAuthorTypes: [人事・評価制度の専門家型, 現場マネージャー型]
    rationale: 評価タスクと目標未記入に直撃。新任が最も困る論点に的中、総合70以上が正答。

  - id: eval_04
    kind: high_relevance
    expectedBand: [70, 100]
    plan:
      tentativeTitle: なんとなくグリーンで終わらせない——ブランド・リニューアルの意思決定
      readerSituation: しずく天然水の春リニューアルで方向性に自信が持てず、6/5役員報告の根拠を固めたい
      whyNowForYou: リニューアル定例(drive/01・05)で『誰に売るか』まで到達できず、役員報告が迫るから
      coreMessage: 競合の後追いに見えない『独自の必然性』を、役員に通る根拠へ落とす意思決定フレーム
      diffFromMarket: 汎用ブランド論でなく、消費財の主力リニューアル×役員説得という具体局面に絞り、marketGap(競合分析drive/05)を反映
      keyInsights: [独自の必然性の言語化, 意思決定基準の明文化, 役員説得のストーリー設計]
      agendaOutline: [後追いの罠, 誰に売るかの再定義, 根拠の組み立て, 役員に通すストーリー]
      recommendedAuthorTypes: [ブランド戦略コンサル型, マーケ実務叩き上げ型]
    rationale: リニューアル局面と役員報告のプレッシャーに直撃。業務テーマに的中、総合70以上が正答。

  # --- ずれ: 局面に的中しない一般論（ゲートが落とすべき） --------------------
  - id: eval_05
    kind: low_relevance
    expectedBand: [0, 40]
    plan:
      tentativeTitle: 新入社員のためのビジネスマナー入門
      readerSituation: 社会人1年目で基本マナーを身につけたい人
      whyNowForYou: （あえて外す）対象読者が新入社員で、管理職の佐倉さんの局面とずれている
      coreMessage: 名刺交換・メール作法・敬語など、社会人1年目が身につける基本マナー
      diffFromMarket: 特になし（一般的なマナー本）
      keyInsights: [挨拶, メール作法, 敬語]
      agendaOutline: [身だしなみ, 名刺交換, メール, 電話応対]
      recommendedAuthorTypes: [マナー講師型]
    rationale: 対象読者がずれ、一般論で局面に的中せず。4観点とも低得点で総合40以下が正答（ゲートが落とす証明）。

  - id: eval_06
    kind: low_relevance
    expectedBand: [0, 40]
    plan:
      tentativeTitle: 起業1年で年商1億——独立スタートアップ術
      readerSituation: ゼロから事業を立ち上げたい起業志望者
      whyNowForYou: （あえて外す）大企業内でブランドとチームを預かる課長の前提とは異なる
      coreMessage: ゼロから事業を立ち上げ、最速で売上を作る独立起業のロードマップ
      diffFromMarket: 特になし（一般的な起業本）
      keyInsights: [資金調達, PMF, 初期売上]
      agendaOutline: [起業の準備, 最初の顧客, 資金, 拡大]
      recommendedAuthorTypes: [連続起業家型]
    rationale: 大企業内マーケ課長の局面(組織・評価・ブランド)と無関係。総合40以下が正答。

  # --- セレンディピティ: 業務外の教養テーマ（①は嗜好・許容度整合に読み替え・閾値70） ----------
  # 設計原則: テーマに読者のchallenges語彙（リーダーシップ/意思決定等の能力名詞）を含めず主語を素材側に置く（距離2）。
  # whyNowForYou は読者の課題に言及せず「何をたどれて何が得られるか」の棚書き文法（step2_plan_owner.md のserendipity規律と同一）。
  - id: eval_07
    kind: serendipity
    expectedBand: [70, 100]
    plan:
      tentativeTitle: もしあなたがヴェネツィア共和国の元首なら？——「組織の寿命」を決める歴史の分岐点ショート・ストーリー
      readerSituation: 新任2ヶ月。初めて年上で実力者の部下を含む7名を率いる移行期にあり、自チームの采配とブランドの中長期的な方向性を決める局面にいる
      whyNowForYou: 本書では、ローマ帝国やヴェネツィア共和国といった歴史上の巨大組織が「致命的な分岐点」で実際に何をし、なぜ栄え、なぜ滅びたのかを短いストーリーで追体験できる。それを学ぶことで、目先の事象に振り回されない深く長期的な判断の軸を獲得できるから
      coreMessage: 組織の盛衰は外部の脅威ではなく、権限の配分と「目先の延命か理念の貫徹か」という内部の意思決定で決まる。歴史の追体験を通じて、本質を見極める視座を獲得する
      diffFromMarket: 市販の歴史教養書はマクロな制度論の学術的大著か偉人の格言集に二極化（marketGap）。本書はミドルスケールの意思決定に焦点を絞り、1エピソード読み切りの歴史疑似体験ストーリー形式で教養の深さと読みやすさを両立する
      keyInsights: [権限の配分（包括的制度と収奪的制度）, 生存戦略の選択（目先の延命か理念の貫徹か）, 内部の慢心（成功体験への固執と空洞化）]
      agendaOutline: [タイムスリップ・ケーススタディ序章, ローマ帝国辺境の将軍たち（権限配分）, グリーンランドの消えた集落（生存戦略）, ヴェネツィア共和国の黄昏（内部の空洞化）, 優れた集団の転落（規律の喪失）, 歴史の結末を知る者として決断を下す終章]
      recommendedAuthorTypes: [歴史ケーススタディのストーリーテラー, ビジネス×歴史の教養系著述家, 疑似体験型構成の歴史社会学者]
    rationale: 距離2テーマ（challenges語彙なし）×棚書き③×読み切り形式。嗜好（事例・ストーリーで学ぶ/要点絞り）と整合し、読み替え①で高得点＝70以上が正答。2026-06-12のSTEP2手動検証でleader承認90点（R1差し戻し→R2承認）の実績企画。

  - id: eval_08
    kind: serendipity
    expectedBand: [70, 100]
    plan:
      tentativeTitle: ブランドはなぜ"宗教"に似るのか——物語と共同体の数千年史
      readerSituation: 消費財ブランドを預かり、中長期のブランド価値構築とパーパスブランディングに関心を持つマーケター
      whyNowForYou: 本書では、世界の宗教が数千年にわたり「信じられる物語」と共同体をどう設計し、何が信仰を持続させ、何が形骸化を招いたかをたどれる。それを学ぶことで、パーパスブランディングの本質を「物語と共同体の構造」から捉え直す視座を獲得できるから
      coreMessage: 持続するブランドと持続する信仰は同じ構造を持つ——共有された物語・儀式・共同体。表層のスローガンではなく構造から、パーパスを捉え直す
      diffFromMarket: 実務マーケ本（パーパス策定ハウツー）でも宗教学の学術書でもなく、両者の構造的相似をブランド実務家が読める粒度で示す越境教養（marketGap）
      keyInsights: [信仰とブランドの構造的相似, 物語と儀式が共同体を保つ仕組み, 形骸化（権威化・空洞化）が信頼を失わせる過程]
      agendaOutline: [なぜ宗教は数千年続くのか, 物語の設計, 儀式と共同体, 形骸化の構造, ブランドへの示唆]
      recommendedAuthorTypes: [宗教社会学×マーケの越境型, 物語論の研究者, ブランド論の実務家]
    rationale: パーパス関心（drv_007）の隣の教養。テーマの主語は素材側（宗教・物語）で、whyNowForYouは課題非言及の棚書き文法。読み替え①（嗜好・関心整合）で70以上が正答。

# 境界(閾値70近傍)の判別力チェック（診断専用・8件ゲートには含めない・C5.4再現性/C5.5閾値調整）
borderlineCases:
  # ギリ通す: 局面に的中し観測に紐づくが、差別化・調査反映が高関連4件よりやや弱い
  - id: eval_b1
    kind: borderline_pass
    expectedBand: [68, 80]
    plan:
      tentativeTitle: 部下との1on1を「型」にする——新任マネージャーの対話設計
      readerSituation: 新任2ヶ月、7名との1on1を始めたが形骸化しそうで手応えがない
      whyNowForYou: 課長就任メモ(drive/03=drv_003)に『1on1定例化(形骸化しそう)』、1on1議事(drive/06=drv_006)に相手ごとの悩みが並ぶから
      coreMessage: 1on1は雑談でも査定でもなく、期待役割をすり合わせ直す定例にする
      diffFromMarket: 汎用1on1本でなく、年上の佐藤さんを含む経験バラバラの7名への相手別1on1設計に寄せる（ただしmarketGapの固有性はeval_01ほど鋭くない）
      keyInsights: [1on1の目的設計, 相手タイプ別の問い, 形骸化を防ぐ仕組み]
      agendaOutline: [なぜ形骸化するか, 目的の設計, 相手別の対話, 続ける仕組み]
      recommendedAuthorTypes: [人事・組織開発型, 現場マネージャー型]
    rationale: 観測(drv_003/006)に紐づき局面に的中するが、差別化・調査反映が高関連4件よりやや弱い。総合70を僅かに上回るのが正答＝「ギリ通す」境界の再現性を見る。

  # ギリ落とす: 話題は隣接するが固有局面に踏み込まない一般論（lowほど低くはならない）
  - id: eval_b2
    kind: borderline_fail
    expectedBand: [50, 68]
    plan:
      tentativeTitle: リーダーシップの教科書——チームを動かす5つの力
      readerSituation: チームを率いるすべてのリーダーへ
      whyNowForYou: マネージャーになったあなたに、リーダーシップの基礎を体系的に
      coreMessage: 信頼・ビジョン・傾聴・権限委譲・評価の5つの力でチームは動く
      diffFromMarket: 5つの力を体系的に網羅している点（固有局面への限定はなし）
      keyInsights: [信頼, ビジョン, 傾聴, 権限委譲, 評価]
      agendaOutline: [リーダーとは, 信頼の作り方, ビジョンを語る, 傾聴, 委譲と評価]
      recommendedAuthorTypes: [リーダーシップ論の総合型]
    rationale: 委譲・評価など佐倉さんの関心に触れはするが、年上の佐藤さん/6-5役員報告/リニューアルの固有局面に踏み込まず「教科書/5つの力」の最大公約数。総合70を僅かに下回るのが正答＝「ギリ落とす」境界の再現性を見る。マナー入門(eval_05)のような明確なlowとは別物。
